<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- background -->
  <rect width="1280" height="640" fill="#0d1527"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#22c55e" stroke-width="1">
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
  </g>

  <!-- soft green glow behind the logo -->
  <defs>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="220" cy="320" r="190" fill="url(#logoGlow)"/>

  <!-- logo: scaled up 100x100 → 240x240 from public/logo.svg, anchored at (100, 200) -->
  <g transform="translate(100, 200) scale(2.4)">
    <rect width="100" height="100" rx="22" ry="22" fill="#0d1527" stroke="#22c55e" stroke-width="1.5"/>
    <polygon points="86,50 68,81 32,81 14,50 32,19 68,19" fill="none" stroke="#22c55e" stroke-width="3.2" stroke-linejoin="round"/>
    <line x1="50" y1="50" x2="33" y2="34" stroke="#22c55e" stroke-width="2.2"/>
    <line x1="50" y1="50" x2="67" y2="34" stroke="#22c55e" stroke-width="2.2"/>
    <line x1="50" y1="50" x2="33" y2="66" stroke="#22c55e" stroke-width="2.2"/>
    <line x1="50" y1="50" x2="67" y2="66" stroke="#22c55e" stroke-width="2.2"/>
    <circle cx="50" cy="50" r="7.5" fill="#22c55e"/>
    <circle cx="33" cy="34" r="5.5" fill="#22c55e"/>
    <circle cx="67" cy="34" r="5.5" fill="#22c55e"/>
    <circle cx="33" cy="66" r="5.5" fill="#22c55e"/>
    <circle cx="67" cy="66" r="5.5" fill="#22c55e"/>
  </g>

  <!-- right column: OPEN SOURCE pill -->
  <g transform="translate(440, 165)">
    <rect width="172" height="36" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
    <circle cx="22" cy="18" r="5" fill="#22c55e"/>
    <text x="42" y="24" font-size="14" font-weight="700" fill="#22c55e" letter-spacing="2">OPEN SOURCE</text>
  </g>

  <!-- wordmark -->
  <text x="440" y="295" font-size="84" font-weight="800" letter-spacing="-3">
    <tspan fill="#ffffff">Agent</tspan><tspan fill="#22c55e">Breeder</tspan>
  </text>

  <!-- launch headline -->
  <text x="440" y="365" font-size="34" font-weight="500" fill="#cbd5e1" letter-spacing="-0.5">The only agent platform</text>
  <text x="440" y="408" font-size="34" font-weight="500" fill="#cbd5e1" letter-spacing="-0.5">that doesn't pick a winner.</text>

  <!-- chips row -->
  <g transform="translate(440, 450)">
    <rect x="0" y="0" rx="8" width="190" height="42" fill="#0d1527" stroke="#1e3a4a" stroke-width="1"/>
    <text x="95" y="27" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle">Framework Agnostic</text>

    <rect x="205" y="0" rx="8" width="130" height="42" fill="#0d1527" stroke="#1e3a4a" stroke-width="1"/>
    <text x="270" y="27" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle">Multi-Cloud</text>

    <rect x="350" y="0" rx="8" width="170" height="42" fill="#0d1527" stroke="#1e3a4a" stroke-width="1"/>
    <text x="435" y="27" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle">Auto Governance</text>

    <rect x="535" y="0" rx="8" width="140" height="42" fill="#0d1527" stroke="#1e3a4a" stroke-width="1"/>
    <text x="605" y="27" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle">LLM Eval Hub</text>
  </g>

  <!-- footer -->
  <text x="40" y="612" font-size="14" font-weight="500" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">github.com/agentbreeder/agentbreeder</text>
  <text x="1240" y="612" font-size="14" font-weight="500" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="end">agentbreeder.io</text>
</svg>
