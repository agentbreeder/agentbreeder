<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Center hexagon -->
  <polygon points="100,115 122,128 122,154 100,167 78,154 78,128" fill="none"/>

  <!-- Inner hexagon (smaller, for depth) -->
  <polygon points="100,125 112,132 112,148 100,155 88,148 88,132" fill="#FFFFFF" opacity="0.15"/>

  <!-- Stem going up from hexagon top -->
  <line x1="100" y1="115" x2="100" y2="72"/>

  <!-- Left leaf -->
  <path d="M100,85 C85,82 75,72 78,58 C88,62 95,72 100,85" fill="#FFFFFF" stroke="#FFFFFF"/>

  <!-- Right leaf -->
  <path d="M100,85 C115,82 125,72 122,58 C112,62 105,72 100,85" fill="#FFFFFF" stroke="#FFFFFF"/>

  <!-- Center leaf (smaller, on top) -->
  <path d="M100,72 C93,68 90,58 93,48 C98,52 100,62 100,72" fill="#FFFFFF" stroke="#FFFFFF"/>
  <path d="M100,72 C107,68 110,58 107,48 C102,52 100,62 100,72" fill="#FFFFFF" stroke="#FFFFFF"/>

  <!-- Network branches from hexagon vertices -->
  <!-- Top-right branch -->
  <line x1="122" y1="128" x2="148" y2="112"/>
  <circle cx="148" cy="112" r="5" fill="#FFFFFF" stroke="none"/>

  <!-- Right branch -->
  <line x1="122" y1="154" x2="152" y2="154"/>
  <circle cx="152" cy="154" r="5" fill="#FFFFFF" stroke="none"/>

  <!-- Bottom-right branch -->
  <line x1="122" y1="154" x2="148" y2="178"/>
  <circle cx="148" cy="178" r="5" fill="#FFFFFF" stroke="none"/>

  <!-- Bottom-left branch -->
  <line x1="78" y1="154" x2="52" y2="178"/>
  <circle cx="52" cy="178" r="5" fill="#FFFFFF" stroke="none"/>

  <!-- Left branch -->
  <line x1="78" y1="154" x2="48" y2="154"/>
  <circle cx="48" cy="154" r="5" fill="#FFFFFF" stroke="none"/>

  <!-- Top-left branch -->
  <line x1="78" y1="128" x2="52" y2="112"/>
  <circle cx="52" cy="112" r="5" fill="#FFFFFF" stroke="none"/>

  <!-- Bottom stem -->
  <line x1="100" y1="167" x2="100" y2="195"/>
  <circle cx="100" cy="195" r="5" fill="#FFFFFF" stroke="none"/>
</svg>
