name: ts-greeter
version: 0.1.0
description: "Minimal TypeScript example demonstrating the AgentBreeder registry pattern (prompts + tools resolved via refs)."
team: examples
owner: dev@agentbreeder.com
tags: [example, typescript, registry-pattern]

# This is a TypeScript example — use the Node runtime, not the Python
# 'custom' framework path. The Node runtime expects agent.ts as the entry
# point (which already exists alongside this agent.yaml).
runtime:
  language: node
  framework: custom
  version: "20"
  entrypoint: agent.ts

model:
  primary: gemini-2.5-flash

tools:
  - ref: tools/get-utc-time

prompts:
  system: prompts/ts-greeter-system

deploy:
  cloud: local
  runtime: docker-compose
