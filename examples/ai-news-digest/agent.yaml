name: ai-news-digest
version: 1.0.0
description: "Daily AI news digest — HN + ArXiv + RSS, summarised by Gemma3:27b, emailed via Gmail"
team: examples
owner: dev@company.com
tags: [news, digest, ollama, gemma, google-adk, email, example]

framework: google_adk

model:
  primary: ollama/gemma3:27b
  temperature: 0.4
  max_tokens: 4096

tools:
  # Registry refs — resolved via engine.tool_resolver from local files in ./tools/
  - ref: tools/fetch-hackernews
  - ref: tools/fetch-arxiv
  - ref: tools/fetch-rss
  - ref: tools/send-email

prompts:
  # Resolved via engine.prompt_resolver from ./prompts/ai-news-digest-system.md
  system: prompts/ai-news-digest-system

deploy:
  cloud: local
  env_vars:
    LOG_LEVEL: info
    NEWS_COUNT: "15"
    DIGEST_HOUR: "8"
    SMTP_HOST: smtp.gmail.com
    SMTP_PORT: "587"
    OLLAMA_BASE_URL: http://localhost:11434
  secrets:
    - SMTP_USER
    - SMTP_PASSWORD
    - RECIPIENT_EMAILS

google_adk:
  session_backend: memory
  memory_service: memory
  artifact_service: memory
